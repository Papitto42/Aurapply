# Minimal MongoDB Configuration for Local Development
# This config uses minimal resources (256MB cache)

storage:
  dbPath: ~/.mongodb/aurapply-data
  journal:
    enabled: true
  wiredTiger:
    engineConfig:
      cacheSizeGB: 0.25  # Very small cache (256MB)

net:
  port: 27017
  bindIp: 127.0.0.1

systemLog:
  destination: file
  path: ~/.mongodb/mongod.log
  logAppend: true

processManagement:
  fork: false
